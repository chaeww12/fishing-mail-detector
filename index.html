<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>피싱 탐지 시스템</title>
</head>
<body>

<h2>📧 피싱 메일 + URL 탐지기</h2>

<h3>메일 입력</h3>
<textarea id="mail" rows="8" cols="60"></textarea>

<h3>URL 입력</h3>
<input type="text" id="url" size="60">

<br><br>
<button onclick="analyze()">분석하기</button>

<hr>

<h3>📊 메일 분석 결과</h3>
<p id="mail_score"></p>
<p id="mail_level"></p>

<ul id="keywords"></ul>

<hr>

<h3>🔗 URL 분석 결과</h3>
<p id="url_score"></p>
<p id="url_level"></p>

<ul id="url_reasons"></ul>

<script>

// =====================
// 메일 키워드
// =====================
const dangerWords = {
    "비밀번호": 2,
    "로그인": 2,
    "인증": 2,
    "계정": 2,
    "긴급": 3,
    "당첨": 3,
    "환불": 2,
    "결제": 1,
    "업데이트": 1,
    "보안": 1,
    "확인": 1,
    "즉시": 3,
    "클릭": 3,
    "은행": 2
};

// =====================
// URL 분석
// =====================
function analyzeURL(url) {

    let score = 0;
    let reasons = [];

    if (url.length > 70) {
        score += 2;
        reasons.push("URL 길이가 매우 김");
    } else if (url.length > 50) {
        score += 1;
        reasons.push("URL 길이가 다소 김");
    }

    if (url.startsWith("http://")) {
        score += 1;
        reasons.push("http 사용");
    }

    if (/\d+\.\d+\.\d+\.\d+/.test(url)) {
        score += 2;
        reasons.push("IP 주소 사용");
    }

    let special_count = (url.match(/-/g) || []).length;

    if (special_count >= 4) {
        score += 2;
        reasons.push("특수문자 많음");
    } else if (special_count >= 2) {
        score += 1;
        reasons.push("특수문자 다소 많음");
    }

    let suspicious_words = [
        "login", "verify", "secure",
        "update", "account", "bank",
        "confirm", "password"
    ];

    for (let word of suspicious_words) {
        if (url.toLowerCase().includes(word)) {
            score += 1;
            reasons.push("의심 키워드: " + word);
        }
    }

    let suspicious_domains = [".xyz", ".tk", ".ru"];

    for (let d of suspicious_domains) {
        if (url.includes(d)) {
            score += 2;
            reasons.push("의심 도메인: " + d);
        }
    }

    return [score, reasons];
}

// =====================
// 메일 분석
// =====================
function analyzeMail(mail) {

    let score = 0;
    let found = [];

    for (let word in dangerWords) {
        if (mail.includes(word)) {
            score += dangerWords[word];
            found.push(word);
        }
    }

    return [score, found];
}

// =====================
// 판정 함수
// =====================
function judge(score) {

    if (score >= 10) return "⚠️ 매우 위험";
    else if (score >= 5) return "⚠️ 의심";
    else return "✅ 안전";
}

// =====================
// 실행
// =====================
function analyze() {

    let mail = document.getElementById("mail").value;
    let url = document.getElementById("url").value;

    let [mail_score, found_words] = analyzeMail(mail);
    let [url_score, url_reasons] = analyzeURL(url);

    // ------------------
    // 메일 출력
    // ------------------
    document.getElementById("mail_score").innerText =
        "점수: " + mail_score;

    document.getElementById("mail_level").innerText =
        "판정: " + judge(mail_score);

    let klist = document.getElementById("keywords");
    klist.innerHTML = "";

    for (let w of found_words) {
        let li = document.createElement("li");
        li.innerText = w;
        klist.appendChild(li);
    }

    // ------------------
    // URL 출력
    // ------------------
    document.getElementById("url_score").innerText =
        "점수: " + url_score;

    document.getElementById("url_level").innerText =
        "판정: " + judge(url_score);

    let ulist = document.getElementById("url_reasons");
    ulist.innerHTML = "";

    for (let r of url_reasons) {
        let li = document.createElement("li");
        li.innerText = r;
        ulist.appendChild(li);
    }
}

</script>

</body>
</html>
